<!DOCTYPE html>
<html lang="zh-Hant" data-theme="day">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Worship Music · 樂譜</title>
<meta name="description" content="Personal worship music sheet library — Drive-backed, mobile-first, edit + save annotations.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- PDF.js v4 (legacy ESM build for broad mobile compat) -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/legacy/build/pdf.min.mjs" type="module"></script>
<!-- pdf-lib for PDF mutation (FreeText annotations) -->
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<!-- Google Identity Services (OAuth) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🎸</span>
      <h1>Worship Music</h1>
      <span class="subtitle">樂譜庫</span>
    </div>
    <div class="topbar-actions">
      <button id="signin-btn" class="btn btn-ghost" title="Sign in to enable editing">Sign in</button>
      <button id="theme-btn" class="btn btn-ghost" aria-label="Toggle theme" title="Toggle day/night">🌙</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="library">📚 Library <span class="zh">樂譜</span></button>
    <button class="tab" data-view="playlists">📅 Playlists <span class="zh">主日</span></button>
  </nav>

  <main class="content">
    <!-- LIBRARY view -->
    <section id="view-library" class="view active">
      <div class="search-row">
        <input id="lib-search" class="search" type="search" placeholder="Search song… 搜尋樂譜" autocomplete="off">
        <span id="lib-count" class="muted">—</span>
      </div>
      <div id="lib-grid" class="grid"></div>
    </section>

    <!-- PLAYLISTS view -->
    <section id="view-playlists" class="view">
      <div class="search-row">
        <h2 class="muted small">Sunday Sets · 主日歌單</h2>
        <button id="new-playlist-btn" class="btn btn-ghost" disabled title="Sign in to create">＋ New</button>
      </div>
      <div id="playlist-list" class="playlist-list"></div>
    </section>
  </main>

  <!-- PDF Viewer modal -->
  <div id="viewer" class="viewer hidden">
    <header class="viewer-bar">
      <button id="viewer-close" class="btn btn-ghost" aria-label="Close">✕</button>
      <div class="viewer-title">
        <span id="viewer-name">—</span>
        <span id="viewer-progress" class="muted small"></span>
      </div>
      <div class="viewer-actions">
        <button id="viewer-prev" class="btn btn-ghost" aria-label="Previous">←</button>
        <button id="viewer-next" class="btn btn-ghost" aria-label="Next">→</button>
        <button id="viewer-edit" class="btn btn-primary" disabled title="Sign in to edit">✏️ Edit</button>
        <button id="viewer-cancel" class="btn btn-ghost hidden">Cancel</button>
        <button id="viewer-save" class="btn btn-primary hidden">💾 Save</button>
      </div>
    </header>

    <!-- Edit toolbar (hidden until edit mode) -->
    <div id="edit-toolbar" class="edit-toolbar hidden">
      <button class="btn btn-ghost edit-tool" data-tool="pen">✍️ Pen</button>
      <button class="btn btn-ghost edit-tool active" data-tool="text">📝 Text</button>
      <button class="btn btn-ghost edit-tool" data-tool="highlight">🎨 Highlight</button>
      <input type="color" id="edit-color" value="#cc1f1f" title="Colour">
      <input type="number" id="edit-fontsize" value="14" min="6" max="48" step="1" title="Font size / Pen width" style="width:60px;">
      <button id="edit-undo" class="btn btn-ghost" title="Undo last">↶ Undo</button>
      <span id="edit-count" class="muted small"></span>
    </div>

    <div id="viewer-canvas-wrap" class="viewer-canvas-wrap"></div>
  </div>

  <!-- Playlist editor modal -->
  <div id="pl-editor" class="viewer hidden">
    <header class="viewer-bar">
      <button id="pl-close" class="btn btn-ghost" aria-label="Close">✕</button>
      <div class="viewer-title">
        <span>Playlist Editor · 歌單</span>
      </div>
      <div class="viewer-actions">
        <button id="pl-delete" class="btn btn-ghost" title="Delete playlist">🗑️</button>
        <button id="pl-save" class="btn btn-primary">💾 Save</button>
      </div>
    </header>
    <div class="pl-edit-body">
      <div class="pl-fields">
        <label>Date <input id="pl-date" type="date"></label>
        <label>Title <input id="pl-title" type="text" placeholder="Sunday Service"></label>
        <label>Notes <input id="pl-notes" type="text" placeholder="optional"></label>
      </div>
      <div class="pl-songs">
        <h3>Songs <span class="muted small">tap to remove · drag to reorder</span></h3>
        <ul id="pl-songs-list" class="pl-songs-list"></ul>
        <div class="pl-add">
          <input id="pl-song-search" type="search" placeholder="Add song from library… 加歌">
          <div id="pl-song-suggest" class="pl-suggest"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status / toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
